name: CI

on:
  push:

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show environment info
        run: |
          echo "Current directory:"
          pwd
          echo "Files in repo:"
          ls -R

  test:
    needs: inspect
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify README exists
        run: |
          echo "Checking for README.md..."
          test -f README.md
          echo "README exists ✔"

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build container image
        run: |
          echo "Building container image..."
          docker build -t cicd-lab:latest .
          docker images



